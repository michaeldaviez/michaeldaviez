<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saját Linkgyűjtemény</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Modern Glassmorphism & Gradient háttér */
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            color: white;
            padding: 1rem;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .link-item {
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .link-item:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* Profilkép körüli világító effekt */
        .profile-ring {
            position: relative;
        }
        .profile-ring::before {
            content: '';
            position: absolute;
            top: -4px; left: -4px; right: -4px; bottom: -4px;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.7;
            filter: blur(8px);
        }

        /* Gomb kattintás effekt */
        .link-item:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="w-full max-w-md glass-card p-8 text-center">
        <!-- Profil szekció -->
        <div class="mb-8">
            <div class="inline-block profile-ring mb-4">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="Profilkép" class="w-24 h-24 rounded-full bg-slate-800 border-2 border-white/20">
            </div>
            <h1 class="text-2xl font-bold tracking-tight">Kovács János</h1>
            <p class="text-white/60 text-sm mt-1">Full-stack Developer & Designer</p>
        </div>

        <!-- Link gyűjtemény -->
        <div class="space-y-4">
            <a href="#" class="link-item flex items-center p-4 rounded-xl group">
                <div class="w-10 h-10 bg-white/10 rounded-lg flex items-center justify-center mr-4 group-hover:bg-blue-500 transition-colors">
                    <i class="fa-brands fa-instagram text-xl"></i>
                </div>
                <span class="flex-grow text-left font-medium">Instagram</span>
                <i class="fa-solid fa-chevron-right text-white/30 text-xs"></i>
            </a>

            <a href="#" class="link-item flex items-center p-4 rounded-xl group">
                <div class="w-10 h-10 bg-white/10 rounded-lg flex items-center justify-center mr-4 group-hover:bg-blue-400 transition-colors">
                    <i class="fa-brands fa-twitter text-xl"></i>
                </div>
                <span class="flex-grow text-left font-medium">Twitter / X</span>
                <i class="fa-solid fa-chevron-right text-white/30 text-xs"></i>
            </a>

            <a href="#" class="link-item flex items-center p-4 rounded-xl group">
                <div class="w-10 h-10 bg-white/10 rounded-lg flex items-center justify-center mr-4 group-hover:bg-slate-700 transition-colors">
                    <i class="fa-brands fa-github text-xl"></i>
                </div>
                <span class="flex-grow text-left font-medium">GitHub Portfolio</span>
                <i class="fa-solid fa-chevron-right text-white/30 text-xs"></i>
            </a>

            <a href="#" class="link-item flex items-center p-4 rounded-xl group">
                <div class="w-10 h-10 bg-white/10 rounded-lg flex items-center justify-center mr-4 group-hover:bg-red-500 transition-colors">
                    <i class="fa-solid fa-envelope text-xl"></i>
                </div>
                <span class="flex-grow text-left font-medium">Kapcsolat (Email)</span>
                <i class="fa-solid fa-chevron-right text-white/30 text-xs"></i>
            </a>
        </div>

        <!-- Social Footer -->
        <div class="mt-10 flex justify-center space-x-6 text-white/40">
            <a href="#" class="hover:text-white transition-colors"><i class="fa-brands fa-linkedin text-xl"></i></a>
            <a href="#" class="hover:text-white transition-colors"><i class="fa-brands fa-facebook text-xl"></i></a>
            <a href="#" class="hover:text-white transition-colors"><i class="fa-brands fa-youtube text-xl"></i></a>
        </div>

        <p class="text-[10px] uppercase tracking-widest text-white/20 mt-12 font-semibold">
            &copy; 2024 Minden jog fenntartva
        </p>
    </div>

    <script>
        // Opcionális: Interaktív háttérmozgás egérre
        document.body.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            document.body.style.background = `linear-gradient(${135 + (x * 10)}deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)`;
        });
    </script>
</body>
</html>
